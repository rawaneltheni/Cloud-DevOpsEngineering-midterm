<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Collector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>
<body>
    <main style="width:100%;max-width:720px;margin:64px auto;">
        <form method="POST" style="display:flex;gap:12px;align-items:center;">
            <input type="text" name="message" placeholder="Enter message" style="flex:1;padding:12px;border:1px solid var(--border);border-radius:6px;">
            <button type="submit" class="refresh-link" style="min-height:44px;">Submit</button>
        </form>
    </main>
</body>
</html>
